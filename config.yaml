# 搜索引擎时效性分析系统配置文件

# 阈值配置
thresholds:
  # 时效性评估
  poor_score: 50      # 时效性差的阈值
  fair_score: 70      # 时效性一般的阈值
  
  # 评分权重
  weights:
    avg_age: 0.4      # 平均doc年龄权重
    fresh_ratio: 0.3  # 新鲜文档占比权重
    min_age: 0.2      # 最新文档发现能力权重
    card: 0.1         # 时效卡权重
  
  # 原因1：query时效性等级识别错误
  recognition:
    fresh_age_strong: 3    # 强新鲜度偏好：≤3天
    fresh_age_medium: 7    # 中等新鲜度偏好：≤7天
    fresh_age_weak: 30     # 弱新鲜度偏好：≤30天
    fresh_ratio_high: 0.8  # 高新鲜文档集中度：≥80%
    fresh_ratio_medium: 0.5 # 中等新鲜文档集中度：≥50%
  
  # 原因2：doc时效性打分公式不合理
  scoring:
    high_timeliness:       # 高时效query的阈值
      corr_min: -1.0       # 相关系数最小值
      corr_max: -0.6       # 相关系数最大值
      std_min: 0.15        # 打分标准差最小值
      gap_min: 0.3         # 新旧文档打分差距最小值
      decay_rate_min: 0.1  # 最小衰减率
    other_timeliness:      # 其他时效query的阈值
      corr_min: -0.6
      corr_max: -0.2
      std_min: 0.05
      gap_min: 0.1
    rank_ratio_max: 1.5    # 新文档排名比值最大值
  
  # 原因3：融合策略不合理
  fusion:
    improvement_potential: 0.3      # 理想排序提升潜力阈值
    high_query_boost: 0.2           # 高时效query提升阈值
    fresh_suppression_ratio: 0.5    # 新文档压制比例阈值

# 特征配置
features:
  top_k_values: [3, 5, 10]          # 计算TOP-K特征的K值列表
  time_windows: [1, 3, 7, 30]       # 时间窗口（天）
  fresh_threshold: 7                # 新文档定义：7天内
  old_threshold: 30                 # 旧文档定义：30天外

# 输出配置
output:
  export_json: true       # 导出JSON格式
  export_html: true       # 导出HTML格式
  export_csv: true        # 导出CSV格式
  detail_level: verbose   # 详细程度：verbose / normal / simple
  
# 日志配置
logging:
  level: INFO             # DEBUG / INFO / WARNING / ERROR
  file: logs/analysis.log # 日志文件路径
